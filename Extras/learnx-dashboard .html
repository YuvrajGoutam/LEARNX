<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnX Dashboard – Learn to Code, Build, and Grow</title>
  <!-- FIX #17: Added meta description and Open Graph tags -->
  <meta name="description"
    content="LearnX is your all-in-one coding learning platform. Track your progress, join live classes, solve DSA problems, and climb the leaderboard." />
  <meta property="og:title" content="LearnX Dashboard" />
  <meta property="og:description"
    content="Your personal coding learning hub — courses, live classes, practice, and roadmaps." />
  <meta property="og:type" content="website" />
  <!-- FIX #16: font-display=swap added to Google Fonts URL -->
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <!-- FIX #18: Use production React builds instead of development builds -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- FIX #18: Use Babel standalone only for transpiling; ideally pre-compiled but kept for single-file demo -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ── Reset ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: 'Sora', 'DM Sans', sans-serif;
      transition: background 0.3s, color 0.3s;
    }


    /* ── Design Tokens ── */
    :root {
      --color-bg: #121212;
      --color-surface: #1A1A1A;
      --color-surface2: #282828;
      --color-accent: #1DB954;
      --color-purple: #A855F7;
      --color-text: #FFFFFF;
      --color-text-sec: #C8C8C8;
      --color-live: #FF4444;

      --color-border: #333333;
      --color-border-subtle: #2a2a2a;
      --color-border-strong: #444444;
      --color-surface3: #1e1e1e;
      --color-surface4: #1a1a1a;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;

      --space-xs: 6px;
      --space-sm: 10px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;

      --font-xs: 11px;
      --font-sm: 12px;
      --font-base: 14px;
      --font-md: 16px;
      --font-lg: 18px;
      --font-xl: 22px;
    }

    /* ── Light Mode Overrides ── */
    [data-theme="light"] {
      --color-bg: #F9F6EE;
      --color-surface: #EEEAE1;
      --color-surface2: #E2DDD4;
      --color-text: #121212;
      --color-text-sec: #555555;

      --color-border: #FFE5B4;
      --color-border-subtle: #FFE5B4;
      --color-border-strong: #FFE5B4;
      --color-surface3: #FFE5B4;
      --color-surface4: #FFE5B4;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--color-surface4);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--color-border-strong);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    /* ── Animations ── */
    @keyframes gradientShift {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.8);
        opacity: 0.4;
      }
    }

    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 4px 24px rgba(255, 68, 68, 0.45);
      }

      50% {
        box-shadow: 0 4px 40px rgba(255, 68, 68, 0.75);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Hover helpers ── */
    .nav-link:hover {
      background: rgba(29, 185, 84, 0.08) !important;
    }

    .pill:hover {
      background: rgba(29, 185, 84, 0.12) !important;
      color: #fff !important;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.08) !important;
    }

    .course-card:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 40px rgba(29, 185, 84, 0.18);
    }

    .stat-card:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 32px rgba(29, 185, 84, 0.15);
    }

    /* ── Sidebar label opacity transition ── */
    .sidebar-label {
      opacity: 1;
      pointer-events: auto;
      transition: opacity 0.15s ease 0.1s, max-width 0.3s;
      white-space: nowrap;
      overflow: hidden;
    }

    .sidebar-collapsed .sidebar-label {
      opacity: 0;
      pointer-events: none;
      max-width: 0;
      transition: opacity 0.05s ease, max-width 0.3s;
    }

    /* ── Roadmap scroll fade indicator ── */
    .roadmap-scroll-wrap {
      position: relative;
    }

    .roadmap-scroll-wrap::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 60px;
      background: linear-gradient(to right, transparent, #121212);
      pointer-events: none;
      border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
    }

    html {
      scroll-behavior: smooth;
    }

    /* ── Keyboard focus ring ── */
    button:focus-visible,
    a:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* ── Button / Link styles ── */
    a.btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--color-accent);
      color: #000;
      border-radius: var(--radius-md);
      padding: 12px 24px;
      font-weight: 800;
      font-size: var(--font-base);
      text-decoration: none;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    a.btn-primary:hover {
      opacity: 0.88;
    }

    a.btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: var(--radius-md);
      padding: 12px 24px;
      font-weight: 700;
      font-size: var(--font-base);
      text-decoration: none;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
    }

    a.btn-secondary:hover {
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.05);
    }

    a.btn-accent-sm {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--color-accent);
      color: #000;
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      font-weight: 700;
      font-size: var(--font-sm);
      text-decoration: none;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    a.btn-accent-sm:hover {
      opacity: 0.88;
    }

    a.btn-outline-sm {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--color-accent);
      border: 1px solid var(--color-accent);
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      font-weight: 700;
      font-size: var(--font-sm);
      text-decoration: none;
      font-family: inherit;
      transition: background 0.15s;
    }

    a.btn-outline-sm:hover {
      background: rgba(29, 185, 84, 0.1);
    }

    a.btn-live {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #FF4444, #cc3333);
      color: #fff;
      border-radius: var(--radius-md);
      padding: 12px 28px;
      font-weight: 800;
      font-size: 15px;
      text-decoration: none;
      font-family: inherit;
      box-shadow: 0 4px 20px rgba(255, 68, 68, 0.3);
      transition: opacity 0.15s;
    }

    a.btn-live:hover {
      opacity: 0.9;
    }

    /* FIX #15: Added hover state for btn-live-now (was missing) */
    /* FIX #12: Removed duplicate text-decoration: none */
    a.btn-live-now {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #FF4444, #FF6B00);
      color: #fff;
      border-radius: var(--radius-md);
      padding: 12px 28px;
      font-weight: 800;
      font-size: 15px;
      text-decoration: none;
      font-family: inherit;
      box-shadow: 0 4px 24px rgba(255, 68, 68, 0.45);
      animation: pulse-glow 1.5s ease-in-out infinite;
      transition: opacity 0.15s;
    }

    a.btn-live-now:hover {
      opacity: 0.88;
    }

    a.link-accent {
      color: var(--color-accent);
      font-size: var(--font-base);
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
      cursor: pointer;
    }

    a.link-accent:hover {
      opacity: 0.75;
    }

    a.btn-solve {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--color-accent);
      color: #000;
      border-radius: var(--radius-md);
      padding: 12px 24px;
      font-weight: 800;
      font-size: var(--font-base);
      text-decoration: none;
      font-family: inherit;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    a.btn-solve:hover {
      opacity: 0.88;
    }

    a.btn-course-continue {
      background: var(--color-accent);
      color: #000;
      border-radius: var(--radius-sm);
      padding: 6px 16px;
      font-size: var(--font-sm);
      font-weight: 700;
      text-decoration: none;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    a.btn-course-continue:hover {
      opacity: 0.85;
    }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      gap: 12px;
      color: var(--color-text-sec);
      text-align: center;
    }

    .empty-state .es-icon {
      font-size: 48px;
    }

    .empty-state .es-title {
      font-weight: 700;
      font-size: var(--font-lg);
      color: var(--color-text);
    }

    .empty-state .es-msg {
      font-size: var(--font-sm);
    }

    /* ── View panels ── */
    .view-panel {
      animation: fadeSlideUp 0.3s ease;
    }

    /* ── Notification dropdown ── */
    .notif-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 320px;
      background: var(--color-surface3);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
      z-index: 300;
      animation: slideDown 0.18s ease;
      overflow: hidden;
    }

    .notif-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--color-border-subtle);
      cursor: pointer;
      transition: background 0.12s;
    }

    .notif-item:last-child {
      border-bottom: none;
    }

    .notif-item:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    /* ── Profile / Settings view styles ── */
    .settings-section {
      background: var(--color-surface3);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 20px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--color-border-subtle);
    }

    .settings-row:last-child {
      border-bottom: none;
    }

    .toggle {
      width: 40px;
      height: 22px;
      border-radius: 99px;
      border: none;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }

    .toggle.on {
      background: var(--color-accent);
    }

    .toggle.off {
      background: var(--color-border-strong);
    }

    .toggle::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      top: 3px;
      transition: left 0.2s;
    }

    .toggle.on::after {
      left: 21px;
    }

    .toggle.off::after {
      left: 3px;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Design Tokens (JS mirror) ── */
    const COLORS = {
      bg: "var(--color-bg)",
      surface: "var(--color-surface)",
      surface2: "var(--color-surface2)",
      accent: "var(--color-accent)",
      purple: "var(--color-purple)",
      text: "var(--color-text)",
      textSec: "var(--color-text-sec)",
      live: "var(--color-live)",
    };

    /* ── Data ── */
    const courses = [
      { id: 1, title: "Full Stack Web Dev", instructor: "Rahul Sharma", tag: "Hot 🔥", tagColor: "#FF6B35", rating: 4.8, enrolled: "32k", price: "Free", thumb: "🌐", progress: 0, category: "Web Dev" },
      { id: 2, title: "Python for AI", instructor: "Priya Mehta", tag: "New 🆕", tagColor: "#1DB954", rating: 4.9, enrolled: "28k", price: "₹999", thumb: "🐍", progress: 0, category: "AI/ML" },
      { id: 3, title: "DSA in Java", instructor: "Ankit Gupta", tag: "Beginner", tagColor: "#A855F7", rating: 4.7, enrolled: "45k", price: "Free", thumb: "☕", progress: 0, category: "DSA" },
      { id: 4, title: "React Native", instructor: "Sneha Kapoor", tag: "Hot 🔥", tagColor: "#FF6B35", rating: 4.6, enrolled: "19k", price: "₹1499", thumb: "📱", progress: 0, category: "Web Dev" },
      { id: 5, title: "DevOps Bootcamp", instructor: "Vikram Singh", tag: "Beginner", tagColor: "#A855F7", rating: 4.5, enrolled: "12k", price: "₹799", thumb: "🐳", progress: 0, category: "DevOps" },
      { id: 6, title: "System Design", instructor: "Arjun Nair", tag: "Hot 🔥", tagColor: "#FF6B35", rating: 4.9, enrolled: "38k", price: "₹1999", thumb: "🏗️", progress: 0, category: "System Design" },
      { id: 7, title: "JavaScript Mastery", instructor: "Riya Patel", tag: "New 🆕", tagColor: "#1DB954", rating: 4.8, enrolled: "51k", price: "Free", thumb: "⚡", progress: 0, category: "Web Dev" },
      { id: 8, title: "Flutter Dev", instructor: "Dev Kumar", tag: "Beginner", tagColor: "#A855F7", rating: 4.4, enrolled: "9k", price: "₹599", thumb: "🦋", progress: 0, category: "Web Dev" },
    ];

    const roadmaps = [
      { icon: "🎨", title: "Frontend", steps: 24, completion: 0 },
      { icon: "⚙️", title: "Backend", steps: 30, completion: 0 },
      { icon: "🚀", title: "Full Stack", steps: 52, completion: 0 },
      { icon: "🐳", title: "DevOps", steps: 28, completion: 0 },
      { icon: "🤖", title: "AI/ML", steps: 35, completion: 0 },
      { icon: "📱", title: "Android", steps: 22, completion: 0 },
    ];

    const leaderboard = [
      { rank: 1, name: "Karan Mehta", xp: 18420, badge: "🏆", avatar: "KM" },
      { rank: 2, name: "Pooja Singh", xp: 16890, badge: "🥈", avatar: "PS" },
      { rank: 3, name: "Arjun Dev", xp: 15670, badge: "🥉", avatar: "AD" },
      { rank: 4, name: "Nisha Rao", xp: 14200, badge: "⭐", avatar: "NR" },
      { rank: 5, name: "Aman Tiwari", xp: 13580, badge: "⭐", avatar: "AT" },
    ];

    const navLinks = [
      { icon: "🏠", label: "Home" },
      { icon: "🔭", label: "Explore" },
      { icon: "📚", label: "My Courses" },
      { icon: "📡", label: "Live Classes" },
      { icon: "💻", label: "Practice" },
      { icon: "🗺️", label: "Roadmaps" },
      { icon: "🏆", label: "Leaderboard" },
      { icon: "👤", label: "Profile" },
      { icon: "⚙️", label: "Settings" },
    ];

    const filters = ["All", "Web Dev", "DSA", "Python", "AI/ML", "DevOps", "System Design"];

    const notifications = [
      { id: 1, icon: "📡", title: "Live class starting soon", body: "Advanced System Design in 45 min", time: "Just now", unread: true },
      { id: 2, icon: "🏆", title: "New rank achieved!", body: "You reached #23 on the leaderboard", time: "2h ago", unread: false },
      { id: 3, icon: "🔥", title: "0-day streak!", body: "Keep it up — you're on fire", time: "Yesterday", unread: false },
    ];

    /* ── useWindowSize hook ── */
    function useWindowSize() {
      const [width, setWidth] = useState(() =>
        typeof window !== "undefined" ? window.innerWidth : 1280
      );
      useEffect(() => {
        const onResize = () => setWidth(window.innerWidth);
        window.addEventListener("resize", onResize, { passive: true });
        return () => window.removeEventListener("resize", onResize);
      }, []);
      return width;
    }

    /* ── CSS var helpers ── */
    function var_r(k) { return `var(--radius-${k})`; }
    function var_f(k) { return `var(--font-${k})`; }

    /* ── Derive stats ── */
    function deriveStats(coursesArr) {
      const enrolled = coursesArr.filter(c => c.progress > 0);
      return {
        streak: 0,
        enrolledCount: enrolled.length,
        solved: 0,
        xp: 0,
      };
    }

    /* ── ProgressBar ── */
    function ProgressBar({ value }) {
      const [width, setWidth] = useState(0);
      useEffect(() => {
        const t = setTimeout(() => setWidth(value), 400);
        return () => clearTimeout(t);
      }, [value]);
      return (
        <div style={{ background: "var(--color-border)", borderRadius: 99, height: 6, overflow: "hidden", width: "100%" }}>
          <div style={{
            width: `${width}%`, height: "100%",
            background: `linear-gradient(90deg, ${COLORS.accent}, #17a844)`,
            borderRadius: 99, transition: "width 1s cubic-bezier(0.4,0,0.2,1)",
          }} />
        </div>
      );
    }

    /* ── StatCard ── */
    function StatCard({ icon, value, label }) {
      return (
        <div className="stat-card" aria-label={`${label}: ${value}`} style={{
          background: COLORS.surface2, borderRadius: var_r("lg"), padding: "20px 16px",
          display: "flex", flexDirection: "column", gap: 8, flex: 1,
          border: "1px solid var(--color-border)", transition: "transform 0.2s, box-shadow 0.2s",
          cursor: "default",
        }}>
          <span style={{ fontSize: 26 }} aria-hidden="true">{icon}</span>
          <span style={{ fontSize: 28, fontWeight: 800, color: COLORS.text, lineHeight: 1 }}>{value}</span>
          <span style={{ fontSize: var_f("xs"), color: COLORS.textSec, fontWeight: 500 }}>{label}</span>
        </div>
      );
    }

    /* ── CourseCard ── */
    function CourseCard({ course, showProgress, onNavigate }) {
      const hasProgress = course.progress > 0;
      const showContinue = showProgress && hasProgress;
      return (
        <article className="course-card" style={{
          background: COLORS.surface2, borderRadius: var_r("lg"), overflow: "hidden",
          border: "1px solid var(--color-border)", transition: "transform 0.2s, box-shadow 0.2s",
          cursor: "pointer", display: "flex", flexDirection: "column",
        }}>
          <div style={{
            height: 120, background: "linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 48, position: "relative",
          }}>
            <span aria-hidden="true">{course.thumb}</span>
            <div style={{
              position: "absolute", top: 10, left: 10, background: course.tagColor,
              borderRadius: var_r("sm"), padding: "2px 10px", fontSize: var_f("xs"), fontWeight: 700, color: "#fff",
            }}>{course.tag}</div>
          </div>
          <div style={{ padding: "14px 14px 16px", display: "flex", flexDirection: "column", gap: 6, flex: 1 }}>
            <div style={{ fontWeight: 700, color: COLORS.text, fontSize: var_f("base"), lineHeight: 1.3 }}>{course.title}</div>
            <div style={{ fontSize: var_f("sm"), color: COLORS.textSec }}>{course.instructor}</div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: var_f("xs") }}>
              <span style={{ color: "#FFD700" }}>★ {course.rating}</span>
              <span style={{ color: COLORS.textSec }}>· {course.enrolled} enrolled</span>
            </div>
            {showContinue ? (
              <>
                <ProgressBar value={course.progress} />
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 4 }}>
                  <span style={{ fontSize: var_f("xs"), color: COLORS.textSec }}>{course.progress}% complete</span>
                  <a href="#my-courses" onClick={e => { e.preventDefault(); onNavigate && onNavigate("My Courses"); }} className="btn-course-continue" aria-label={`Continue ${course.title}`} style={{ background: COLORS.accent, color: "#000", borderRadius: var_r("sm"), padding: "6px 16px", fontSize: var_f("sm"), fontWeight: 700, cursor: "pointer", fontFamily: "inherit", transition: "opacity 0.15s", textDecoration: "none" }}>Continue</a>
                </div>
              </>
            ) : (
              <div style={{ marginTop: "auto", paddingTop: 8, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{
                  background: course.price === "Free" ? "rgba(29,185,84,0.15)" : "transparent",
                  color: course.price === "Free" ? COLORS.accent : COLORS.text,
                  border: course.price === "Free" ? "none" : "1px solid #555",
                  borderRadius: var_r("sm"), padding: "3px 10px", fontSize: var_f("sm"), fontWeight: 700,
                }}>{course.price}</span>

    /* ── FIX #1 & #2: Single LiveClassBanner with its own timer; Countdown removed (was dead code).
           Removed unused started/setStarted props from signature. ── */
    function LiveClassBanner({ mobile }) {
      const [time, setTime] = useState(45 * 60 + 23);
      const isLive = time === 0;
      useEffect(() => {
        if (isLive) return;
        const t = setInterval(() => setTime(p => Math.max(0, p - 1)), 1000);
        return () => clearInterval(t);
      }, [isLive]);
      const m = Math.floor((time % 3600) / 60);
      const s = time % 60;
      const pad = n => String(n).padStart(2, "0");

      return (
        <section aria-label="Live Class">
          <div style={{
            background: COLORS.surface2,
            border: `1px solid ${isLive ? "rgba(29,185,84,0.4)" : "rgba(255,68,68,0.3)"}`,
            borderRadius: var_r("xl"),
            padding: mobile ? "20px" : "24px 32px",
            display: "flex", flexDirection: mobile ? "column" : "row",
            alignItems: mobile ? "flex-start" : "center", gap: 20,
            position: "relative", overflow: "hidden",
            transition: "border-color 0.4s",
          }}>
            <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at 100% 0%, rgba(255,68,68,0.06) 0%, transparent 60%)", pointerEvents: "none" }} aria-hidden="true" />
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                <PulsingDot />
                <span style={{
                  background: isLive ? COLORS.accent : COLORS.live,
                  color: isLive ? "#000" : "#fff",
                  borderRadius: 6, padding: "2px 10px", fontWeight: 800, fontSize: var_f("xs"),
                  transition: "background 0.4s, color 0.4s",
                }}>{isLive ? "● LIVE NOW" : "LIVE"}</span>
              </div>
              <div style={{ fontWeight: 800, fontSize: mobile ? 17 : 20, color: COLORS.text, marginBottom: 4 }}>Advanced System Design Masterclass</div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
                <div style={{ width: 28, height: 28, borderRadius: "50%", background: `linear-gradient(135deg,${COLORS.purple},#7c3aed)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "#fff" }} aria-hidden="true">AN</div>
                <span style={{ color: COLORS.textSec, fontSize: 13 }}>
                  Arjun Nair · {isLive ? "Class is live!" : "Starts in"}
                </span>
                {!isLive && (
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    {[`${pad(m)}m`, `${pad(s)}s`].map((seg, i) => (
                      <div key={i} style={{ background: "var(--color-surface4)", border: "1px solid var(--color-border)", borderRadius: var_r("sm"), padding: "3px 8px", fontWeight: 800, fontSize: 14, color: COLORS.text }}>{seg}</div>
                    ))}
                  </div>
                )}
              </div>
            </div>
            <a href="#live-class" className={isLive ? "btn-live-now" : "btn-live"} aria-label={isLive ? "Join live class now" : "Join upcoming live class"}>
              {isLive ? "🔴 Join Now (Live)" : "📡 Join Now"}
            </a>
          </div>
        </section>
      );
    }

    /* ══════════════════════════
       APP ROOT
       ══════════════════════════ */
    function App() {
      const [sidebarHov, setSidebarHov] = useState(false);
      const [activeFilter, setActiveFilter] = useState("All");
      const [isDark, setIsDark] = useState(true);

      const [userProfile, setUserProfile] = useState({
        name: "Yuvraj Mishra",
        email: "yuvraj.mishra@gmail.com",
        username: "@yuvraj_mishra"
      });

      const getInitials = (name) => {
        if (!name) return "U";
        const parts = name.trim().split(" ");
        if (parts.length > 1) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
        return parts[0].substring(0, 2).toUpperCase();
      };
      const initials = getInitials(userProfile.name);
      /* Initialise activeNav from the URL hash so page refreshes and direct links work */
      const [activeNav, setActiveNav] = useState(() => {
        const hash = window.location.hash.replace("#", "");
        const match = navLinks.find(l => l.label.toLowerCase().replace(/\s+/g, "-") === hash);
        return match ? match.label : "Home";
      });
      const [searchQuery, setSearchQuery] = useState("");
      const [searchFocused, setSearchFocused] = useState(false);
      const [showNotif, setShowNotif] = useState(false);
      const [showStreak, setShowStreak] = useState(false);

      /* Apply data-theme attribute to drive CSS variable switching */
      useEffect(() => {
        document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
      }, [isDark]);

      const notifRef = useRef(null);
      const streakRef = useRef(null);

      const windowWidth = useWindowSize();
      const mobile = windowWidth < 768;
      const tablet = windowWidth >= 768 && windowWidth < 1024;
      const desktop = windowWidth >= 1024;

      const stats = deriveStats(courses);

      const sidebarCollapsed = tablet && !sidebarHov;

      /* ── Browser back/forward support via History API ── */
      /* On first mount, replace the current history entry so the initial page has a state */
      useEffect(() => {
        const initial = window.location.hash.replace("#", "") || "home";
        window.history.replaceState({ nav: activeNav }, "", `#${activeNav.toLowerCase().replace(/\s+/g, "-")}`);
      }, []); // eslint-disable-line react-hooks/exhaustive-deps

      /* Listen for popstate (back / forward button clicks) */
      useEffect(() => {
        const onPop = e => {
          if (e.state && e.state.nav) {
            setActiveNav(e.state.nav);
            setShowNotif(false);
            setShowStreak(false);
          }
        };
        window.addEventListener("popstate", onPop);
        return () => window.removeEventListener("popstate", onPop);
      }, []);

      /* Close dropdowns on outside click */
      useEffect(() => {
        const handler = e => {
          if (notifRef.current && !notifRef.current.contains(e.target)) setShowNotif(false);
          if (streakRef.current && !streakRef.current.contains(e.target)) setShowStreak(false);
        };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
      }, []);

      /* Navigate: update state + push a history entry so the back button works */
      const handleNavChange = useCallback(label => {
        setActiveNav(label);
        setShowNotif(false);
        setShowStreak(false);
        window.history.pushState({ nav: label }, "", `#${label.toLowerCase().replace(/\s+/g, "-")}`);
        /* Scroll the main content area back to the top on every view switch */
        const main = document.querySelector("main");
        if (main) main.scrollTop = 0;
      }, []);

      /* Render the correct view based on activeNav */
      function renderView() {
        const sharedProps = { mobile, tablet, desktop };
        switch (activeNav) {
          case "Home": return <HomeView {...sharedProps} stats={stats} activeFilter={activeFilter} setActiveFilter={setActiveFilter} onNavigate={handleNavChange} searchQuery={searchQuery} userProfile={userProfile} />;
          case "Explore": return <ExploreView {...sharedProps} activeFilter={activeFilter} setActiveFilter={setActiveFilter} searchQuery={searchQuery} />;
          case "My Courses": return <MyCoursesView {...sharedProps} activeFilter={activeFilter} setActiveFilter={setActiveFilter} searchQuery={searchQuery} />;
          case "Live Classes": return <LiveClassesView mobile={mobile} />;
          case "Practice": return <PracticeView mobile={mobile} />;
          case "Roadmaps": return <RoadmapsView {...sharedProps} />;
          case "Leaderboard": return <LeaderboardView mobile={mobile} />;
          case "Profile": return <ProfileView mobile={mobile} stats={stats} userProfile={userProfile} getInitials={getInitials} />;
          case "Settings": return <SettingsView mobile={mobile} isDark={isDark} onToggleDark={() => setIsDark(d => !d)} userProfile={userProfile} setUserProfile={setUserProfile} />;
          default: return <HomeView {...sharedProps} stats={stats} activeFilter={activeFilter} setActiveFilter={setActiveFilter} onNavigate={handleNavChange} searchQuery={searchQuery} userProfile={userProfile} />;
        }
      }

      return (
        <div style={{ fontFamily: "'Sora','DM Sans',sans-serif", background: COLORS.bg, color: COLORS.text, minHeight: "100vh", display: "flex", flexDirection: "column" }}>

          <div style={{ display: "flex", flex: 1, position: "relative" }}>

            {/* ── SIDEBAR ── */}
            {!mobile && (
              <aside
                aria-label="Main navigation"
                onMouseEnter={() => tablet && setSidebarHov(true)}
                onMouseLeave={() => tablet && setSidebarHov(false)}
                className={sidebarCollapsed ? "sidebar-collapsed" : ""}
                style={{
                  width: tablet ? (sidebarHov ? 220 : 64) : 220,
                  minHeight: "100vh", background: COLORS.surface,
                  borderRight: "1px solid var(--color-border-subtle)", display: "flex", flexDirection: "column",
                  position: "fixed", top: 0, left: 0, zIndex: 100,
                  transition: "width 0.3s cubic-bezier(0.4,0,0.2,1)", overflow: "hidden",
                }}>

                {/* Logo */}
                <a href="#home" onClick={e => { e.preventDefault(); handleNavChange("Home"); }} aria-label="Go to dashboard" style={{ padding: "16px", display: "flex", alignItems: "center", gap: 10, borderBottom: "1px solid var(--color-border-subtle)", height: 64, textDecoration: "none", cursor: "pointer" }}>
                  <div style={{ width: 32, height: 32, background: COLORS.accent, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 18, color: "#000", flexShrink: 0 }}>L</div>
                  <span className="sidebar-label" style={{ fontWeight: 800, fontSize: 20, color: COLORS.text }}>LearnX</span>
                </a>

                {/* Nav links */}
                <nav aria-label="Sidebar" style={{ flex: 1, padding: "12px 8px", display: "flex", flexDirection: "column", gap: 2 }}>
                  {navLinks.map(link => {
                    const active = activeNav === link.label;
                    const href = `#${link.label.toLowerCase().replace(/\s+/g, "-")}`;
                    return (
                      <a key={link.label}
                        href={href}
                        className="nav-link"
                        aria-current={active ? "page" : undefined}
                        onClick={e => { e.preventDefault(); handleNavChange(link.label); }}
                        style={{
                          display: "flex", alignItems: "center", gap: 12, padding: "10px 12px",
                          borderRadius: 10, cursor: "pointer", width: "100%",
                          background: active ? "rgba(29,185,84,0.12)" : "transparent",
                          borderLeft: active ? `3px solid ${COLORS.accent}` : "3px solid transparent",
                          color: active ? COLORS.accent : COLORS.textSec,
                          fontWeight: active ? 700 : 500, fontSize: var_f("base"),
                          transition: "all 0.15s", textDecoration: "none",
                          whiteSpace: "nowrap", fontFamily: "inherit",
                        }}>
                        <span style={{ fontSize: 18, flexShrink: 0 }} aria-hidden="true">{link.icon}</span>
                        <span className="sidebar-label">{link.label}</span>
                      </a>
                    );
                  })}
                </nav>

                {/* User panel */}
                <div className="sidebar-label" style={{ borderTop: "1px solid var(--color-border-subtle)" }}>
                  <div style={{ padding: "16px", display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 36, height: 36, borderRadius: "50%", background: `linear-gradient(135deg,${COLORS.accent},${COLORS.purple})`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 13, color: "#fff", flexShrink: 0 }} aria-hidden="true">{initials}</div>
                    <div style={{ flex: 1, overflow: "hidden" }}>
                      <div style={{ fontWeight: 700, fontSize: 13, color: COLORS.text, whiteSpace: "nowrap" }}>{userProfile.name}</div>
                      <div style={{ display: "inline-block", background: "rgba(168,85,247,0.2)", color: COLORS.purple, borderRadius: 6, padding: "1px 6px", fontSize: 10, fontWeight: 700, marginTop: 2 }}>⚡ LVL 12 · {stats.xp.toLocaleString()} XP</div>
                    </div>
                  </div>
                </div>
              </aside>
            )}

            {/* ── MAIN ── */}
            <div style={{ marginLeft: mobile ? 0 : (tablet ? 64 : 220), flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>

              {/* TOP NAV */}
              <header style={{
                height: 64, background: `${COLORS.surface}ee`, backdropFilter: "blur(12px)",
                borderBottom: "1px solid var(--color-border-subtle)", display: "flex", alignItems: "center",
                padding: mobile ? "0 16px" : "0 24px", gap: 16,
                position: "sticky", top: 0, zIndex: 50,
              }}>
                {mobile && (
                  <a href="#home" onClick={e => { e.preventDefault(); handleNavChange("Home"); }} aria-label="Go to dashboard" style={{ display: "flex", alignItems: "center", gap: 8, textDecoration: "none", cursor: "pointer" }}>
                    <div style={{ width: 28, height: 28, background: COLORS.accent, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 15, color: "#000" }}>L</div>
                    <span style={{ fontWeight: 800, fontSize: 18, color: COLORS.text }}>LearnX</span>
                  </a>
                )}
                {/* FIX #3: functional search with state */}
                {!mobile && (
                  <div style={{ flex: 1, position: "relative", maxWidth: 480 }}>
                    <span style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", fontSize: 16, color: COLORS.textSec }} aria-hidden="true">🔍</span>
                    <input
                      type="search"
                      value={searchQuery}
                      onChange={e => setSearchQuery(e.target.value)}
                      onFocus={() => setSearchFocused(true)}
                      onBlur={() => setSearchFocused(false)}
                      aria-label="Search courses, topics, instructors"
                      placeholder="Search courses, topics, instructors..."
                      style={{
                        width: "100%", background: searchFocused ? COLORS.surface2 : "#1f1f1f",
                        border: `1px solid ${searchFocused ? COLORS.accent : "var(--color-border)"}`,
                        borderRadius: var_r("md"), padding: "9px 14px 9px 40px", color: COLORS.text,
                        fontSize: var_f("base"), outline: "none", transition: "all 0.2s", fontFamily: "inherit",
                      }} />
                  </div>
                )}
                <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 8 }}>

                  {/* FIX #6: notification bell with working dropdown */}
                  <div ref={notifRef} style={{ position: "relative" }}>
                    <button
                      className="icon-btn"
                      aria-label="Notifications (1 unread)"
                      aria-expanded={showNotif}
                      onClick={() => { setShowNotif(p => !p); setShowStreak(false); }}
                      style={{ background: "transparent", border: "none", cursor: "pointer", padding: "8px", borderRadius: 10, position: "relative", color: COLORS.text, fontSize: 20 }}>
                      🔔
                      <span aria-hidden="true" style={{ position: "absolute", top: 5, right: 5, width: 8, height: 8, background: COLORS.live, borderRadius: "50%", border: "2px solid #121212" }} />
                    </button>
                    {showNotif && <NotificationPanel onClose={() => setShowNotif(false)} />}
                  </div>

                  {/* FIX #8: streak button with working dropdown */}
                  <div ref={streakRef} style={{ position: "relative" }}>
                    <button
                      className="icon-btn"
                      aria-label={`${stats.streak} day streak — click for details`}
                      aria-expanded={showStreak}
                      onClick={() => { setShowStreak(p => !p); setShowNotif(false); }}
                      style={{ background: "rgba(29,185,84,0.12)", border: "none", cursor: "pointer", padding: "6px 12px", borderRadius: 10, color: COLORS.accent, fontWeight: 700, fontSize: var_f("base"), display: "flex", alignItems: "center", gap: 4 }}>
                      🔥 <span>{stats.streak}</span>
                    </button>
                    {showStreak && <StreakPanel streak={stats.streak} onClose={() => setShowStreak(false)} />}
                  </div>

                  {/* FIX #8: profile avatar navigates to Profile view */}
                  {!mobile && (
                    <a href="#profile" onClick={e => { e.preventDefault(); handleNavChange("Profile"); }} aria-label={`Profile: ${userProfile.name}`} style={{ width: 36, height: 36, borderRadius: "50%", background: `linear-gradient(135deg,${COLORS.accent},${COLORS.purple})`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 13, color: "#fff", textDecoration: "none" }}>{initials}</a>
                  )}
                </div>
              </header>

              {/* MOBILE SEARCH — FIX #3: functional */}
              {mobile && (
                <div style={{ padding: "10px 16px", background: COLORS.surface, borderBottom: "1px solid var(--color-border-subtle)" }}>
                  <div style={{ position: "relative" }}>
                    <span aria-hidden="true" style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", fontSize: 14, color: COLORS.textSec }}>🔍</span>
                    <input
                      type="search"
                      value={searchQuery}
                      onChange={e => setSearchQuery(e.target.value)}
                      aria-label="Search courses"
                      placeholder="Search courses..."
                      style={{ width: "100%", background: COLORS.surface2, border: "1px solid var(--color-border)", borderRadius: 10, padding: "8px 12px 8px 36px", color: COLORS.text, fontSize: var_f("base"), outline: "none", fontFamily: "inherit" }} />
                  </div>
                </div>
              )}

              {/* CONTENT — FIX #4 & #5: renders active view */}
              <main style={{ flex: 1, overflowY: "auto", paddingBottom: mobile ? 80 : 40 }}>
                <div style={{ padding: mobile ? "20px 16px" : "28px 28px" }}>
                  {renderView()}
                </div>
              </main>
            </div>
          </div>

          {/* MOBILE BOTTOM NAV — FIX #4: clicking items actually changes the view */}
          {mobile && (
            <nav aria-label="Mobile navigation" style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: `${COLORS.surface}f5`, backdropFilter: "blur(12px)", borderTop: "1px solid var(--color-border-subtle)", display: "flex", zIndex: 200, padding: "6px 0" }}>
              {[
                { icon: "🏠", label: "Home" },
                { icon: "🔭", label: "Explore" },
                { icon: "📚", label: "My Courses" },
                { icon: "🏆", label: "Leaderboard" },
                { icon: "👤", label: "Profile" },
              ].map(item => {
                const active = activeNav === item.label;
                const href = `#${item.label.toLowerCase().replace(/\s+/g, "-")}`;
                return (
                  <a key={item.label}
                    href={href}
                    aria-current={active ? "page" : undefined}
                    onClick={e => { e.preventDefault(); handleNavChange(item.label); }}
                    style={{
                      flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                      padding: "6px 0", color: active ? COLORS.accent : COLORS.textSec,
                      transition: "color 0.15s", background: "transparent", textDecoration: "none", fontFamily: "inherit",
                    }}>
                    <span aria-hidden="true" style={{ fontSize: 20 }}>{item.icon}</span>
                    <span style={{ fontSize: 9, fontWeight: active ? 700 : 500 }}>{item.label}</span>
                    {active && <div aria-hidden="true" style={{ width: 4, height: 4, borderRadius: "50%", background: COLORS.accent }} />}
                  </a>
                );
              })}
            </nav>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
